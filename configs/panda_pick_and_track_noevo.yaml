max_iterations: 1
candidates_per_iteration: 30
checkpoint_interval: 5
log_level: "INFO"
random_seed: 42

environment:
  env_id: "PandaPickAndTrack"
  adapter_type: "mujoco"
  context_file: "contexts/panda_pick_and_track_context.md"

training:
  # Brax PPO parallelism (increased for 2xlarge)
  num_envs: 3072  # Increased from 2048 for 8 vCPUs
  num_minibatches: 32

  # Cascade timesteps
  total_timesteps: 5000000         # 5M for short training
  total_timesteps_full: 15000000   # 15M for full training
  num_seeds: 3

  # PPO hyperparams
  lr: 0.0005
  gamma: 0.97
  gae_lambda: 0.95
  clip_eps: 0.2
  ent_coef: 0.015
  vf_coef: 0.5
  max_grad_norm: 1.0

  # Evaluation
  eval_episodes: 20
  eval_episodes_for_fitness: 20
  seed: 42

  # Brax-specific
  brax_policy_layers: [32, 32, 32, 32]
  brax_value_layers: [256, 256, 256, 256, 256]
  brax_episode_length: 500
  brax_unroll_length: 10
  brax_updates_per_batch: 8
  brax_batch_size: 1024
  brax_num_evals: 20

mdp_interface:
  max_obs_dim: 512

crash_filter:
  stage0_timeout: 5
  stage1_timeout: 10
  stage2_timeout: 60
  retry_on_crash: true
  max_crash_retries: 1

evaluator:
  timeout: 1800
  max_retries: 2
  cascade_evaluation: false
  success_threshold: 0.02
  parallel_evaluations: 2  # Evaluate 2 candidates in parallel on 2xlarge

llm:
  region_name: "us-east-1"
  model_name: "claude-sonnet-4-6"
  temperature: 0.7
  max_tokens: 128000
  retries: 3
  retry_delay: 1.0

database:
  population_size: 40
  archive_size: 20
  num_islands: 2
  feature_dimensions: ["reward_complexity", "obs_dimensionality"]
  feature_bins: 3
  migration_interval: 5
  migration_rate: 0.2
  exploitation_ratio: 0.75
  exploration_ratio: 0.15

prompt:
  num_top_programs: 3
  num_diverse_programs: 2
  num_failure_examples: 2
  include_artifacts: true
  max_artifact_bytes: 20480

evolution_trace:
  enabled: true
  include_code: true
  include_prompts: true
  buffer_size: 1

task_description: >
  Track a moving 3D target (Lissajous trajectory) with the Panda arm's
  end-effector. Success = mean tracking error < 2cm over the episode.
